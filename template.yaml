AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Ex Libris Pay My Tuition Connetor

Globals:
  Function:
    Timeout: 10

Parameters:
  AlmaApiKey:
    Type: String
    Description: Alma API Key. Obtain at https://developers.exlibrisgroup.com/alma/apis
  PmtLoginKey: 
    Type: String
    Description: Pay My Tuition login key. Obtain from Pay My Tuition."
  PmtTransactionKey: 
    Type: String 
    Description: Pay My Tuition transaction key. Obtain from Pay My Tuition.
  PmtSecretKey: 
    Type: String 
    Description: Pay My Tuition secret key. Obtain from Pay My Tuition.
  PayMyTuitionUrl:
    Type: String
    Description: Optional. Overrides the default PMT.

Resources:
  ConnectorFunction:
    Type: AWS::Serverless::Function 
    Properties:
      CodeUri: ./
      Handler: app/lambda.handler
      Runtime: nodejs12.x
      Environment:
        Variables:
          ALMA_APIKEY: !Sub "${AlmaApiKey}"
          PMT_LOGIN_KEY: !Sub "${PmtLoginKey}"
          PMT_TRAN_KEY: !Sub "${PmtTransactionKey}"
          PMT_SECRET_KEY: !Sub "${PmtSecretKey}"
          PMT_URL: !Sub "${PmtUrl}"
          PMT_EXT_INST_REF: !Sub "${PmtExtInstRef}"
          PMT_PMNT_DEST: !Sub "${PmtPmntDest}" 
          # PMT_PAYMENT_TERM: !Sub "${PayMyTuitionPaymentTerm}"
          PMT_PRIMO_PMNT_TYPE: !Sub "${PmtPrimoPmntType}"
      Events:
        Connector:
          Type: Api
          Properties:
            Path: /payMyTuition
            Method: get
        ConnectorSuccess:
          Type: Api
          Properties:
            Path: /payMyTuition/success
            Method: post 
        ConnectorError:
          Type: Api
          Properties:
            Path: /payMyTuition/error
            Method: get

Outputs:
  PayMyTuitionConnectorApi:
    Description: "API Gateway endpoint URL for Prod stage for Hello World function"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/payMyTuition/"
  PayMyTuitionConnectorFunction:
    Description: "Pay My Tution Connector Function ARN"
    Value: !GetAtt ConnectorFunction.Arn
  PayMyTuitionConnectorFunctionIamRole:
    Description: "Implicit IAM Role created for Pay My Tution Connector function"
    Value: !GetAtt ConnectorFunctionRole.Arn
